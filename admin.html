<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>h_crochetnook – Admin Panel</title>
    <meta name="robots" content="noindex" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body class="admin-body">

    <!-- ===== LOGIN SCREEN ===== -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <div class="login-logo">🧶</div>
            <h1 class="login-title">Admin Panel</h1>
            <p class="login-sub">Sign in to manage your h_crochetnook store</p>

            <div class="form-group">
                <label for="loginUser">Username</label>
                <input type="text" id="loginUser" placeholder="admin" autocomplete="username" />
            </div>
            <div class="form-group">
                <label for="loginPass">Password</label>
                <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" />
            </div>
            <p class="login-error" id="loginError"></p>
            <button class="btn-primary" id="loginBtn" style="width:100%;margin-top:0.5rem;">Sign In →</button>
            <p style="margin-top:1.5rem;font-size:0.78rem;color:#a07060;">
                Default credentials: <strong>admin / admin123</strong>
            </p>
        </div>
    </div>

    <!-- ===== ADMIN PANEL ===== -->
    <div class="admin-layout" id="adminApp" style="display:none;">

        <!-- Sidebar -->
        <aside class="admin-sidebar" id="adminSidebar">
            <a href="index.html" class="brand" style="text-decoration:none;">
                <span class="brand-icon">🧶</span>
                <span class="brand-name">h_crochetnook</span>
            </a>

            <nav>
                <a href="#" class="sidebar-link active" data-section="dashboard">
                    <span class="link-icon">📊</span> Dashboard
                </a>
                <a href="#" class="sidebar-link" data-section="items">
                    <span class="link-icon">🛍️</span> Manage Items
                </a>
                <a href="index.html" class="sidebar-link" target="_blank">
                    <span class="link-icon">🌐</span> View Website
                </a>
            </nav>

            <div class="sidebar-footer">
                <p>Logged in as <strong>Admin</strong></p>
                <button id="logoutBtn">Log out</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">

            <!-- Top Bar -->
            <div class="admin-topbar">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <button class="admin-hamburger" id="adminHamburger" aria-label="Toggle admin menu">☰</button>
                    <h1 id="sectionTitle">Dashboard</h1>
                </div>
                <a href="index.html" class="btn-admin" target="_blank">← Preview Site</a>
            </div>

            <!-- Mobile Overlay -->
            <div class="admin-mobile-overlay" id="adminMobileOverlay"></div>

            <!-- DASHBOARD SECTION -->
            <section id="dashboardSection">
                <div class="admin-stats" id="adminStats">
                    <!-- populated by JS -->
                </div>

                <div style="background:white;border-radius:16px;padding:2rem;box-shadow:var(--shadow-sm);">
                    <h2 style="font-family:var(--font-serif);color:var(--clr-brown);margin-bottom:1.25rem;">Recent Items
                    </h2>
                    <div id="recentItems"></div>
                </div>
            </section>

            <!-- MANAGE ITEMS SECTION -->
            <section id="itemsSection" style="display:none;">
                <div class="admin-panel">

                    <!-- Form -->
                    <div class="admin-form-card">
                        <h2 id="formTitle">Add New Item</h2>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="itemName">Item Name *</label>
                                <input type="text" id="itemName" placeholder="e.g. Crochet Tote Bag" />
                            </div>
                            <div class="form-group">
                                <label for="itemCategory">Category *</label>
                                <select id="itemCategory" required>
                                    <option value="" disabled selected>Select category...</option>
                                    <option value="Bags">Bags</option>
                                    <option value="Home Decor">Home Decor</option>
                                    <option value="Toys">Toys</option>
                                    <option value="Accessories">Accessories</option>
                                    <option value="Clothing">Clothing</option>
                                    <option value="Keychain">Keychain</option>
                                    <option value="Bouquet">Bouquet</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="itemPrice">Price (₹) *</label>
                                <input type="number" id="itemPrice" placeholder="e.g. 999" min="0" />
                            </div>
                            <div class="form-group">
                                <label for="itemBadge">Badge Label</label>
                                <input type="text" id="itemBadge" placeholder="e.g. New, Best Seller" />
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="itemDesc">Description *</label>
                            <textarea id="itemDesc" rows="3" placeholder="Describe the item..."></textarea>
                        </div>

                        <div class="form-group" style="margin-top: 1rem;">
                            <label for="itemMoreInfo">Extended Details (More Info)</label>
                            <textarea id="itemMoreInfo" rows="6"
                                placeholder="Detailed product description, dimensions, care instructions, etc..."></textarea>
                        </div>

                        <div class="form-group">
                            <label for="itemImageFiles">Upload Images</label>

                            <!-- File Upload Input -->
                            <input type="file" id="itemImageFiles" multiple accept="image/*" />

                            <!-- Hidden URL text area to maintain compatibility with JS form logic -->
                            <textarea id="itemImages" style="display: none;"></textarea>
                            <div id="imgPreviewContainer" class="img-preview-container"
                                style="display:flex; gap:0.5rem; flex-wrap:wrap; margin-top:0.5rem;"></div>
                        </div>

                        <div class="form-group" style="display:flex;align-items:center;gap:0.75rem;margin-top:0.5rem;">
                            <input type="checkbox" id="itemFeatured" style="width:auto;accent-color:var(--clr-rose);" />
                            <label for="itemFeatured" style="margin:0;font-size:0.9rem;">Show in Featured
                                Carousel</label>
                        </div>

                        <div class="btn-row">
                            <button class="btn-save" id="saveBtn">💾 Save Item</button>
                            <button class="btn-cancel" id="resetBtn">✕ Reset</button>
                        </div>

                        <input type="hidden" id="editId" />
                    </div>

                    <!-- Items List -->
                    <div class="admin-items-card">
                        <h2>All Items <span id="itemCountBadge" style="font-size:0.8rem;color:var(--clr-muted);"></span>
                        </h2>
                        <input type="text" class="search-bar" id="searchBar" placeholder="🔍 Search items..." />
                        <div class="items-list" id="itemsList"></div>
                    </div>

                </div>
            </section>

        </main>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="data.js"></script>
    <script src="admin.js"></script>
</body>

</html>
